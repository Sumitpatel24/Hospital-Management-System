<!DOCTYPE html>
<html>
<head>

    <title>Doctors Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

    *{
        font-family:'Poppins',sans-serif;
    }

    body{
        background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
        min-height:100vh;
        padding:30px;
    }

    .page-title{
        color:white;
        font-size:38px;
        font-weight:700;
        margin-bottom:25px;
    }

    .search-card{
        background:rgba(255,255,255,.08);
        backdrop-filter:blur(15px);
        border-radius:20px;
        padding:25px;
        margin-bottom:25px;
        box-shadow:0 8px 30px rgba(0,0,0,.25);
    }

    .form-control{
        height:55px;
        border-radius:12px;
        border:none;
    }

    .btn-search{
        height:55px;
        border-radius:12px;
        font-weight:600;
        background:#2563eb;
        border:none;
        color:white;
    }

    .btn-search:hover{
        background:#1d4ed8;
        color:white;
    }

    .table-card{
        background:white;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 10px 35px rgba(0,0,0,.25);
    }

    .table{
        margin-bottom:0;
    }

    .table thead{
        background:#111827;
        color:white;
    }

    .table th{
        padding:18px;
        border:none;
        text-align:center;
    }

    .table td{
        padding:16px;
        vertical-align:middle;
        text-align:center;
    }

    .table tbody tr:hover{
        background:#f8fafc;
        transition:.3s;
    }

    .badge-rating{
        background:#fef3c7;
        color:#92400e;
        padding:8px 12px;
        border-radius:30px;
        font-weight:600;
    }

    .btn-edit{
        background:#f59e0b;
        color:white;
        border:none;
        border-radius:10px;
        padding:8px 16px;
        font-weight:600;
    }

    .btn-edit:hover{
        background:#d97706;
        color:white;
    }

    .btn-delete{
        background:#ef4444;
        color:white;
        border:none;
        border-radius:10px;
        padding:8px 16px;
        font-weight:600;
    }

    .btn-delete:hover{
        background:#dc2626;
        color:white;
    }

    </style>

</head>

<body>

<div class="container-fluid">

    <h1 class="page-title">
        👨‍⚕️ Doctors Management
    </h1>

    <div class="search-card">

        <form method="GET">

            <div class="row">

                <div class="col-md-10">

                    <input type="text"
                           name="search"
                           class="form-control"
                           placeholder="Search Doctor Name or Specialization"
                           value="{{ request.args.get('search','') }}">

                </div>

                <div class="col-md-2">

                    <button class="btn btn-search w-100">
                        Search
                    </button>

                </div>

            </div>

        </form>

    </div>

    <div class="table-card">

        <table class="table table-hover">

            <thead>

            <tr>

                <th>S.No</th>
                <th>Name</th>
                <th>Specialization</th>
                <th>Degree</th>
                <th>Experience</th>
                <th>Rating</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            {% for d in doctors %}

            <tr>

                <td>{{ loop.index }}</td>

                <td>{{ d[1] }}</td>

                <td>{{ d[2] }}</td>

                <td>{{ d[5] }}</td>

                <td>{{ d[6] }} Years</td>

                <td>
                    <span class="badge-rating">
                        ⭐ {{ d[7] }}
                    </span>
                </td>

                <td>{{ d[3] }}</td>

                <td>{{ d[4] }}</td>

                <td>
                    <a href="/doctor/{{ d[0] }}"
                       class="btn btn-info btn-sm">
                       👁 View
                   </a>

                    <a href="/edit_doctor/{{ d[0] }}"
                       class="btn btn-edit btn-sm">
                         ✏ Edit
                    </a>

                    <a href="/delete_doctor/{{ d[0] }}"
                       class="btn btn-delete btn-sm"
                       onclick="return confirm('Delete this doctor?')">
                         🗑 Delete
                    </a>

                </td>

            </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
