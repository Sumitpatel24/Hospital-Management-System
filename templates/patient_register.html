<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
    135deg,
    #4f46e5,
    #7c3aed,
    #9333ea
    );
}

.register-card{

    width:100%;
    max-width:650px;

    background:#020617;

    border-radius:25px;

    overflow:hidden;

    box-shadow:
    0 20px 50px rgba(0,0,0,.35);

}

.card-header{

    text-align:center;

    padding:35px;

    background:linear-gradient(
    135deg,
    #8b5cf6,
    #d946ef
    );

    color:white;

}

.icon-box{

    width:90px;
    height:90px;

    margin:auto;
    margin-bottom:15px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,.15);

    font-size:40px;
}

.card-header h1{
    font-size:38px;
    font-weight:800;
}

.card-header p{
    margin-top:10px;
    font-size:16px;
}

.card-body{
    padding:35px;
}

label{
    color:white;
    font-weight:600;
    margin-bottom:8px;
}

.form-control,
.form-select{

    height:55px;

    border:none;

    border-radius:14px;

    background:#1e293b;

    color:white;
}

.form-control:focus,
.form-select:focus{

    background:#1e293b;
    color:white;

    box-shadow:none;

    border:2px solid #8b5cf6;
}

.form-control::placeholder{
    color:#94a3b8;
}

.register-btn{

    width:100%;

    border:none;

    padding:15px;

    border-radius:14px;

    background:linear-gradient(
    135deg,
    #10b981,
    #22c55e
    );

    color:white;

    font-size:18px;

    font-weight:700;

    transition:.3s;
}

.register-btn:hover{
    transform:translateY(-3px);
}

.login-link{

    display:block;

    text-align:center;

    margin-top:20px;

    color:#cbd5e1;

    text-decoration:none;
}

.login-link span{
    color:#60a5fa;
    font-weight:700;
}

</style>

</head>

<body>

<div class="register-card">

    <div class="card-header">

        <div class="icon-box">
            <i class="fas fa-user-plus"></i>
        </div>

        <h1>Patient Register</h1>

        <p>Hospital Management System</p>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label>
                    <i class="fas fa-user"></i>
                    Full Name
                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Enter Full Name"
                       required>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>
                        <i class="fas fa-calendar"></i>
                        Age
                    </label>

                    <input type="number"
                           name="age"
                           class="form-control"
                           placeholder="Enter Age"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>
                        <i class="fas fa-venus-mars"></i>
                        Gender
                    </label>

                    <select name="gender"
                            class="form-select"
                            required>

                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>

                    </select>

                </div>

            </div>

            <div class="mb-3">

                <label>
                    <i class="fas fa-phone"></i>
                    Mobile Number
                </label>

                <input type="text"
                       name="phone"
                       maxlength="10"
                       class="form-control"
                       placeholder="Enter Mobile Number"
                       required>

            </div>

            <div class="mb-3">

                <label>
                    <i class="fas fa-notes-medical"></i>
                    Disease
                </label>

                <input type="text"
                       name="disease"
                       class="form-control"
                       placeholder="Enter Disease"
                       required>

            </div>

            <div class="mb-4">

                <label>
                    <i class="fas fa-lock"></i>
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Create Password"
                       required>

            </div>

            <button type="submit"
                    class="register-btn">

                <i class="fas fa-user-plus"></i>
                Create Account

            </button>

        </form>

        <a href="/patient_login"
           class="login-link">

           Already have an account?
           <span>Login Here</span>

        </a>

    </div>

</div>

</body>
</html>
