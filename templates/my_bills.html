<!DOCTYPE html>
<html>
<head>

<title>My Bills</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#4338ca,#7c3aed,#a855f7);
    min-height:100vh;
    padding:40px;
}

.bill-card{
    max-width:1250px;
    margin:auto;
    background:#0b1120;
    border-radius:30px;
    overflow:hidden;
    box-shadow:
    0 20px 50px rgba(0,0,0,.35),
    0 0 30px rgba(124,58,237,.25);
}

.card-header{
    background:linear-gradient(135deg,#f59e0b,#f97316,#ea580c);
    color:white;
    padding:35px;
    text-align:center;
}

.card-header h1{
    font-size:42px;
    font-weight:700;
}

.card-header p{
    opacity:.9;
    margin-top:8px;
}

.card-body{
    padding:35px;
}

.stats-box{
    background:linear-gradient(135deg,#10b981,#059669);
    color:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(16,185,129,.3);
}

.stats-box h2{
    font-size:50px;
    font-weight:700;
    margin-top:10px;
}

.table-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.table{
    margin-bottom:0;
}

.table th{
    background:#111827;
    color:white;
    text-align:center;
    padding:18px;
    font-size:15px;
}

.table td{
    text-align:center;
    vertical-align:middle;
    padding:18px;
}

.table-hover tbody tr:hover{
    background:#f3f4f6;
    transform:scale(1.01);
    transition:.3s;
}

.amount{
    color:#16a34a;
    font-weight:700;
    font-size:20px;
}

.print-btn{
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    border:none;
    border-radius:10px;
    padding:8px 18px;
    font-weight:600;
}

.print-btn:hover{
    transform:translateY(-2px);
    transition:.3s;
}

.back-btn{
    margin-top:30px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border:none;
    border-radius:12px;
    padding:12px 35px;
    font-weight:600;
}

.back-btn:hover{
    transform:translateY(-3px);
    transition:.3s;
}

</style>

</head>

<body>

<div class="bill-card">

    <div class="card-header">

        <h1>💰 My Bills</h1>

        <p class="mb-0">
            View All Your Billing Records
        </p>

    </div>

    <div class="card-body">

        <div class="stats-box">

            <h5>Total Bills</h5>

            <h2>{{ bills|length }}</h2>

        </div>

        <div class="table-card">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Doctor</th>
                        <th>Total Amount</th>
                        <th>Bill Date</th>
                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    {% if bills %}

                        {% for b in bills %}

                        <tr>

                            <td>
                                👨‍⚕️ {{ b[3] }}
                            </td>

                            <td class="amount">
                                ₹ {{ b[7] }}
                            </td>

                            <td>
                                {{ b[8] }}
                            </td>
                            <td>
                                <a href="/print_bill/{{ b[0] }}" class="btn print-btn text-white">
                                <i class="fas fa-print"></i> Print
                                </a>
                            </td>

                        </tr>

                        {% endfor %}

                    {% else %}

                        <tr>

                            <td colspan="4" class="text-center text-danger fw-bold py-4">
                                No Bills Found
                            </td>

                        </tr>

                    {% endif %}

                </tbody>

            </table>

        </div>

        <div class="text-center">

            <a href="/patient_dashboard"
               class="btn btn-primary back-btn">

                ← Back To Dashboard

            </a>

        </div>

    </div>

</div>

</body>
</html>
