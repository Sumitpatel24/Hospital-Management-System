<!DOCTYPE html>
<html>
<head>

<title>Add Prescription</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#4f46e5,#7c3aed,#9333ea);
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    padding:40px;
}

.prescription-card{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.card-header{
    background:linear-gradient(135deg,#10b981,#059669);
    color:white;
    padding:25px;
}

.card-body{
    padding:30px;
}

.info-box{
    background:#f8fafc;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
}

label{
    font-weight:600;
    margin-bottom:8px;
}

.form-control{
    border-radius:12px;
}

.btn-save{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    border:none;
    color:white;
    padding:12px 25px;
    border-radius:12px;
    font-weight:600;
}

.btn-back{
    background:#6b7280;
    color:white;
    border-radius:12px;
    padding:12px 25px;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="prescription-card">

    <div class="card-header">

        <h2>💊 Add Prescription</h2>

        <p class="mb-0">
            Doctor Prescription Panel
        </p>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-4">

                <div class="info-box">

                    <strong>Patient:</strong><br>
                    {{ appointment[1] }}

                </div>

            </div>

            <div class="col-md-4">

                <div class="info-box">

                    <strong>Doctor:</strong><br>
                    {{ appointment[2] }}

                </div>

            </div>

            <div class="col-md-4">

                <div class="info-box">

                    <strong>Disease:</strong><br>
                    {{ appointment[3] }}

                </div>

            </div>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label>Medicines</label>

                <textarea
                    name="medicines"
                    class="form-control"
                    rows="5"
                    placeholder="Enter medicines..."
                    required></textarea>

            </div>

            <div class="mb-3">

                <label>Advice</label>

                <textarea
                    name="advice"
                    class="form-control"
                    rows="5"
                    placeholder="Enter doctor advice..."
                    required></textarea>

            </div>

            <button type="submit"
                    class="btn btn-save">

                💾 Save Prescription

            </button>

            <a href="/doctor_dashboard"
               class="btn btn-back">

                ← Back

            </a>

        </form>

    </div>

</div>

</body>
</html>
