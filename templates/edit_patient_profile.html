<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:700px;
    border:none;
    border-radius:20px;
    background:#111827;
    color:white;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.form-control,
.form-select{
    background:#1f2937;
    color:white;
    border:none;
}

.form-control:focus,
.form-select:focus{
    background:#1f2937;
    color:white;
    box-shadow:none;
}

.btn-save{
    background:#10b981;
    border:none;
}

</style>

</head>

<body>

<div class="card">

    <h2 class="mb-4">
        ✏️ Edit Profile
    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>Name</label>

            <input type="text"
                   name="name"
                   value="{{ patient[1] }}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Age</label>

            <input type="number"
                   name="age"
                   value="{{ patient[2] }}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label>Gender</label>

            <select name="gender"
                    class="form-select">

                <option>{{ patient[3] }}</option>
                <option>Male</option>
                <option>Female</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Disease</label>

            <input type="text"
                   name="disease"
                   value="{{ patient[5] }}"
                   class="form-control">

        </div>

        <button type="submit"
                class="btn btn-save text-white w-100">

            💾 Update Profile

        </button>

    </form>

</div>

</body>
</html>
