<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Doctor Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e3a8a,
    #2563eb
    );

    overflow:hidden;
}

.login-card{

    width:100%;
    max-width:500px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 20px 50px rgba(0,0,0,.35);
}

.login-header{

    text-align:center;

    padding:35px;

    background:
    linear-gradient(
    135deg,
    #2563eb,
    #1d4ed8
    );

    color:white;
}

.login-header h1{

    font-size:36px;
    font-weight:700;
    margin-bottom:8px;
}

.login-header p{

    margin:0;
    opacity:.9;
}

.login-body{

    padding:35px;
}

.form-label{

    color:white;
    font-weight:600;
}

.form-control{

    height:55px;

    border:none;

    border-radius:15px;

    background:rgba(255,255,255,.15);

    color:white;
}

.form-control:focus{

    background:rgba(255,255,255,.20);

    color:white;

    box-shadow:none;

    border:2px solid #60a5fa;
}

.form-control::placeholder{
    color:#d1d5db;
}

.login-btn{

    width:100%;

    height:55px;

    border:none;

    border-radius:15px;

    font-size:18px;

    font-weight:600;

    color:white;

    background:
    linear-gradient(
    135deg,
    #10b981,
    #059669
    );

    transition:.3s;
}

.login-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 25px rgba(16,185,129,.4);
}

.footer-links{

    text-align:center;

    margin-top:20px;
}

.footer-links a{

    text-decoration:none;

    color:#93c5fd;

    font-weight:600;
}

.footer-links a:hover{

    color:white;
}

.icon-box{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    background:rgba(255,255,255,.15);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;

    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="login-header">

        <div class="icon-box">
            👨‍⚕️
        </div>

        <h1>Doctor Login</h1>

        <p>
            Hospital Management System
        </p>

    </div>

    <div class="login-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Enter Doctor Email"
                       required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter Password"
                       required>

            </div>

            <button type="submit"
                    class="login-btn">

                <i class="fas fa-sign-in-alt"></i>

                Login

            </button>

        </form>

        <div class="footer-links">

            <a href="/">
                ← Back To Home
            </a>

        </div>

    </div>

</div>

</body>
</html>
