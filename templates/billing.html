<!DOCTYPE html>
<html>

<head>

<title>Hospital Billing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #312e81
    );
}

.billing-card{

    background:rgba(15,23,42,.8);

    backdrop-filter:blur(20px);

    border-radius:25px;

    overflow:hidden;

    box-shadow:
    0 20px 40px rgba(0,0,0,.4);
}

.billing-header{

    padding:30px;

    background:linear-gradient(
    135deg,
    #f59e0b,
    #f97316
    );
}

.billing-header h1{
    color:white;
    font-weight:700;
}

.billing-header p{
    color:#fff;
    margin-top:8px;
}

.billing-body{
    padding:30px;
}

label{
    color:white;
    font-weight:600;
    margin-bottom:8px;
}

.form-control{

    height:55px;

    border:none;

    border-radius:12px;

    background:
    rgba(255,255,255,.08);

    color:white;
}

.form-control:focus{

    background:
    rgba(255,255,255,.12);

    color:white;

    box-shadow:
    0 0 0 3px rgba(59,130,246,.25);
}

.total-box{

    font-size:24px;

    font-weight:700;

    color:#22c55e;
}

.bill-btn{

    height:60px;

    font-size:18px;

    font-weight:700;

    border-radius:15px;
}

.table{

    color:white;
}

.table thead{

    background:
    #111827;
}

.table th{

    color:white;

    border:none;
}

.table td{

    border-color:
    rgba(255,255,255,.08);
}

.table tbody tr:hover{

    background:
    rgba(255,255,255,.05);
}

hr{
    border-color:
    rgba(255,255,255,.1);
}

.form-control,
textarea{
    color: white;
    background: #1e2b45;
    border: 1px solid #334155;
}

.form-control::placeholder,
textarea::placeholder{
    color: #94a3b8 !important;
    opacity: 1;
}

</style>

</head>

<body>

<div class="container py-5">

    <div class="billing-card">

        <div class="billing-header">

            <h1>💰 Hospital Billing Module</h1>

            <p>
                Generate and Print Patient Bills
            </p>

        </div>

        <div class="billing-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Phone Number</label>

                        <input type="text"
                               id="phone"
                               name="phone_number"
                               class="form-control"
                               maxlength="10"
                               placeholder="Enter Patient Phone Number"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Patient Name</label>

                        <input type="text"
                               id="patient_name"
                               name="patient_name"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Age</label>

                        <input type="text"
                               id="age"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Gender</label>

                        <input type="text"
                               id="gender"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Disease</label>

                        <input type="text"
                               id="disease"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Doctor Name</label>

                        <input type="text"
                               id="doctor_name"
                               name="doctor_name"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>Consultation Fee</label>

                        <input type="number"
                               id="consultation_fee"
                               name="consultation_fee"
                               class="form-control"
                               min="0"
                               value="0"
                               required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>Medicine Fee</label>

                        <input type="number"
                               id="medicine_fee"
                               name="medicine_fee"
                               class="form-control"
                               min="0"
                               value="0"
                               required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>Test Fee</label>

                        <input type="number"
                               id="test_fee"
                               name="test_fee"
                               class="form-control"
                               min="0"
                               value="0"
                               required>

                    </div>

                </div>

                <div class="mb-4">

                    <label>Total Amount</label>

                    <input type="text"
                           id="total_amount"
                           class="form-control total-box"
                           value="₹ 0"
                           readonly>

                </div>

                <button type="submit"
                        class="btn btn-success w-100 bill-btn">

                    💳 Generate Bill

                </button>

            </form>
            
            <hr class="my-5">

            <h3 class="text-white mb-4">

                📋 Billing History

            </h3>

            <form method="GET" class="mb-4">

    <input
        type="text"
        name="search"
        value="{{ search }}"
        class="form-control"
        placeholder="🔍 Search Patient or Doctor">

</form>

            <div class="table-responsive">

                <table class="table table-hover table-bordered w-100">

                    <thead>
                            <tr>
                                <th>ID</th>
                                <th>Patient</th>
                                <th>Phone</th>
                                <th>Doctor</th>
                                <th>Total</th>
                                <th>Bill Date</th>
                                <th>Action</th>
                            </tr>
                    </thead>

                <tbody>

                    {% for b in bills %}

                            <tr>

                                <td>{{ b[0] }}</td>
                                <td>{{ b[1] }}</td>
                                <td>{{ b[2] }}</td>
                                <td>{{ b[3] }}</td>

                                <td>₹ {{ b[7] }}</td>

                                <td>{{ b[8] }}</td>

                                <td>
                                    <a href="/print_bill/{{ b[0] }}"
                                    class="btn btn-primary btn-sm">
                                         🖨 Print
                                </a>
                                </td>

                            </tr>

                                {% endfor %}

                        </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

function calculateTotal(){

    let c = parseInt(
        document.getElementById("consultation_fee").value
    ) || 0;

    let m = parseInt(
        document.getElementById("medicine_fee").value
    ) || 0;

    let t = parseInt(
        document.getElementById("test_fee").value
    ) || 0;

    document.getElementById("total_amount").value =
    "₹ " + (c + m + t);
}

/* Fee Calculation */

document.getElementById("consultation_fee")
.addEventListener("input", calculateTotal);

document.getElementById("medicine_fee")
.addEventListener("input", calculateTotal);

document.getElementById("test_fee")
.addEventListener("input", calculateTotal);

/* Patient Auto Fill */

document.getElementById("phone")
.addEventListener("keyup", function(){

    let phone = this.value;

    if(phone.length == 10){

        fetch("/get_patient/" + phone)

        .then(response => response.json())

        .then(data => {

            if(data.name){

                document.getElementById("patient_name").value =
                data.name || "";

                document.getElementById("age").value =
                data.age || "";

                document.getElementById("gender").value =
                data.gender || "";

                document.getElementById("doctor_name").value =
                data.doctor || "";

                /* IMPORTANT FIX */

                document.getElementById("disease").value =
                data.problem || "";

            }
            else{

                document.getElementById("patient_name").value = "";

                document.getElementById("age").value = "";

                document.getElementById("gender").value = "";

                document.getElementById("doctor_name").value = "";

                document.getElementById("disease").value = "";

                alert("Patient Not Found");

            }

        })

        .catch(error => {

            console.log(error);

            document.getElementById("patient_name").value = "";

            document.getElementById("age").value = "";

            document.getElementById("gender").value = "";

            document.getElementById("doctor_name").value = "";

            document.getElementById("disease").value = "";

        });

    }

});

calculateTotal();

</script>

</body>

</html>
