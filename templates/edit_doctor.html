<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Doctor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #312e81
    );
}

/* Main Card */

.edit-card{
    width:100%;
    max-width:850px;

    background:rgba(255,255,255,.10);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:30px;
    overflow:hidden;

    box-shadow:
    0 25px 50px rgba(0,0,0,.35);
}

/* Header */

.card-header{
    padding:30px 40px;

    background:linear-gradient(
        135deg,
        rgba(15,23,42,.95),
        rgba(30,41,59,.95)
    );

    border:none;
}

.card-header h2{
    color:white;
    font-size:38px;
    font-weight:800;
    margin:0;
}

.card-header p{
    color:#cbd5e1;
    margin-top:8px;
    margin-bottom:0;
    font-size:15px;
}

/* Body */

.card-body{
    padding:40px;
}

/* Titles */

.page-title{
    color:white;
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
}

.page-subtitle{
    color:#e2e8f0;
    margin-bottom:35px;
    font-size:15px;
}

/* Labels */

.form-label{
    color:white;
    font-weight:600;
    margin-bottom:8px;
}

/* Inputs */

.form-control,
.form-select{
    height:58px;

    background:rgba(255,255,255,.08);

    border:1px solid rgba(255,255,255,.20);

    color:white;

    border-radius:15px;

    padding-left:18px;

    margin-bottom:22px;

    transition:.3s;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-control:hover,
.form-select:hover{
    border-color:#60a5fa;
}

.form-control:focus,
.form-select:focus{
    background:rgba(255,255,255,.15);

    border:1px solid #60a5fa;

    color:white;

    box-shadow:
    0 0 0 4px rgba(96,165,250,.25);

    outline:none;
}

.form-select option{
    color:black;
}

/* Buttons */

.update-btn{
    height:60px;

    border:none;

    border-radius:16px;

    font-size:18px;

    font-weight:700;

    color:white;

    background:linear-gradient(
        135deg,
        #10b981,
        #059669
    );

    transition:.3s;
}

.update-btn:hover{
    transform:translateY(-4px);

    box-shadow:
    0 15px 30px rgba(16,185,129,.35),
    0 0 20px rgba(16,185,129,.25);
}

.back-btn{
    height:60px;

    border-radius:16px;

    font-size:17px;

    font-weight:600;

    border:none;

    background:white;

    color:#111827;

    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-4px);

    background:#f3f4f6;
}

/* Row spacing */

.row{
    margin-bottom:5px;
}

/* Mobile */

@media(max-width:768px){

    body{
        padding:20px;
    }

    .edit-card{
        max-width:100%;
    }

    .card-header{
        padding:25px;
    }

    .card-header h2{
        font-size:28px;
    }

    .card-body{
        padding:25px;
    }

    .update-btn,
    .back-btn{
        margin-bottom:10px;
    }
}
</style>
</head>

<body>

<div class="edit-card">

    <div class="card-header">
    <h2>🩺 Edit Doctor Profile</h2>
    <p class="mb-0 mt-2 text-white-50">
        Manage and update doctor details
    </p>
</div>

    <div class="card-body">

        <h4 class="page-title">Doctor Information</h4>

        <p class="page-subtitle">
            Update doctor details and save changes.
        </p>

        <form method="POST">

            <label class="form-label">Doctor Name</label>

            <input type="text"
                   name="name"
                   class="form-control mb-4"
                   value="{{ doctor[1] }}"
                   required>

            <label class="form-label">Specialization</label>

            <select name="specialization"
                    class="form-select mb-4"
                    required>

                <option value="">Select Specialization</option>

                <option value="General Physician"
                {% if doctor[2] == "General Physician" %}selected{% endif %}>
                General Physician
                </option>

                <option value="Cardiologist"
                {% if doctor[2] == "Cardiologist" %}selected{% endif %}>
                Cardiologist
                </option>

                <option value="Dermatologist"
                {% if doctor[2] == "Dermatologist" %}selected{% endif %}>
                Dermatologist
                </option>

                <option value="Orthopedic"
                {% if doctor[2] == "Orthopedic" %}selected{% endif %}>
                Orthopedic
                </option>

                <option value="ENT Specialist"
                {% if doctor[2] == "ENT Specialist" %}selected{% endif %}>
                ENT Specialist
                </option>

                <option value="Eye Specialist"
                {% if doctor[2] == "Eye Specialist" %}selected{% endif %}>
                Eye Specialist
                </option>

            </select>

            <div class="row">

                <div class="col-md-6">

                    <label class="form-label">Degree</label>

                    <input type="text"
                           name="degree"
                           class="form-control mb-4"
                           value="{{ doctor[5] }}"
                           required>

                </div>

                <div class="col-md-6">

                    <label class="form-label">Experience (Years)</label>

                    <input type="number"
                           name="experience"
                           class="form-control mb-4"
                           value="{{ doctor[6] }}"
                           min="0"
                           max="50"
                           required>

                </div>

            </div>

            <div class="row">

                <div class="col-md-6">

                    <label class="form-label">Rating</label>

                    <input type="number"
                           step="0.1"
                           min="1"
                           max="5"
                           name="rating"
                           class="form-control mb-4"
                           value="{{ doctor[7] }}"
                           required>

                </div>

                <div class="col-md-6">

                    <label class="form-label">Phone Number</label>

                    <input type="text"
                           name="phone"
                           class="form-control mb-4"
                           value="{{ doctor[3] }}"
                           required>

                </div>

            </div>

            <label class="form-label">Email Address</label>

            <input type="email"
                   name="email"
                   class="form-control mb-4"
                   value="{{ doctor[4] }}"
                   required>

            <div class="row">

                <div class="col-md-8">

                    <button type="submit"
                            class="btn update-btn w-100">

                        ✅ Update Doctor

                    </button>

                </div>

                <div class="col-md-4">

                    <a href="/doctors"
                       class="btn btn-light back-btn w-100">

                        ← Back

                    </a>

                </div>

            </div>

        </form>

    </div>

</div>

</body>
</html>
