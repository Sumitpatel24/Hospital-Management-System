<!DOCTYPE html>
<html>
<head>

<title>Edit Prescription</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#312e81,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px;
    font-family:'Segoe UI',sans-serif;
}

.edit-card{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    border:1px solid rgba(255,255,255,.15);
}

.edit-header{
    background:linear-gradient(135deg,#7c3aed,#a855f7);
    padding:30px;
    color:white;
}

.edit-header h2{
    margin:0;
    font-size:34px;
    font-weight:700;
}

.edit-header p{
    margin-top:8px;
    opacity:.9;
}

.edit-body{
    padding:35px;
}

.form-label{
    color:white;
    font-weight:600;
    margin-bottom:8px;
}

.form-control{
    background:#1e293b;
    border:none;
    color:white;
    padding:14px;
    border-radius:12px;
}

.form-control:focus{
    background:#1e293b;
    color:white;
    box-shadow:0 0 0 3px rgba(168,85,247,.25);
}

textarea{
    resize:none;
}

.btn-update{
    background:linear-gradient(135deg,#16a34a,#22c55e);
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:600;
}

.btn-update:hover{
    transform:translateY(-2px);
}

.btn-back{
    background:#475569;
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:600;
}

.btn-back:hover{
    background:#334155;
}

.readonly-box{
    background:#334155 !important;
}

</style>

<body>

<div class="edit-card">
<div class="edit-header">

    <h2>✏ Edit Prescription</h2>

    <p>
        Update Medicines and Doctor Advice
    </p>

</div>

<div class="edit-body">

    <form method="POST">

        <div class="row">

            <div class="col-md-6 mb-4">

                <label class="form-label">
                    👤 Patient Name
                </label>

                <input type="text"
                       class="form-control readonly-box"
                       value="{{ prescription[1] }}"
                       readonly>

            </div>

            <div class="col-md-6 mb-4">

                <label class="form-label">
                    🩺 Doctor Name
                </label>

                <input type="text"
                       class="form-control readonly-box"
                       value="{{ prescription[2] }}"
                       readonly>

            </div>

        </div>

        <div class="mb-4">

            <label class="form-label">
                🤒 Disease
            </label>

            <input type="text"
                   class="form-control readonly-box"
                   value="{{ prescription[3] }}"
                   readonly>

        </div>

        <div class="mb-4">

            <label class="form-label">
                💊 Medicines
            </label>

            <textarea
                name="medicines"
                rows="5"
                class="form-control"
                required>{{ prescription[4] }}</textarea>

        </div>

        <div class="mb-4">

            <label class="form-label">
                📝 Doctor Advice
            </label>

            <textarea
                name="advice"
                rows="5"
                class="form-control"
                required>{{ prescription[5] }}</textarea>

        </div>

        <div class="row">

            <div class="col-md-8">

                <button
                    type="submit"
                    class="btn btn-update w-100 text-white">

                    💾 Update Prescription

                </button>

            </div>

            <div class="col-md-4">

                <a href="/prescriptions"
                   class="btn btn-back w-100 text-white">

                    ← Back

                </a>

            </div>

        </div>

    </form>

</div>
</div>

</body>

</html>
