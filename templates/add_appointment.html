<!DOCTYPE html>

<html>
<head>
    <title>Book Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

.card{
    border:none;
    border-radius:25px;
    overflow:hidden;
    background:rgba(255,255,255,0.97);
    box-shadow:0 20px 50px rgba(0,0,0,0.20);
}

.card-header{
    background:linear-gradient(45deg,#f7971e,#ffd200)!important;
    border:none;
    padding:20px;
}

.card-header h3{
    font-weight:700;
    color:#222;
    text-align:center;
}

.form-control,
.form-select{
    border-radius:12px;
    border:2px solid #e5e7eb;
    padding:12px;
    transition:0.3s;
}

.form-control:focus,
.form-select:focus{
    border-color:#667eea;
    box-shadow:0 0 12px rgba(102,126,234,.25);
}

label{
    font-weight:600;
    color:#374151;
    margin-bottom:6px;
}

#patient_name,
#age,
#gender{
    background:#f8fafc;
    font-weight:600;
}

.btn-warning{
    background:linear-gradient(45deg,#ff9800,#ffc107);
    border:none;
    border-radius:12px;
    padding:14px;
    transition:.3s;
}

.btn-warning:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

textarea{
    resize:none;
}

</style>

</head>
<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card">

                <div class="card-header">

                    <h3>
                        🏥 Smart Hospital Appointment Booking
                    </h3>

                </div>

                <div class="card-body p-4">

                    <form method="POST">

                        <!-- Phone Number -->

                        <label>Patient Phone Number</label>

                        <input type="tel"
                               id="phone"
                               name="phone"
                               class="form-control mb-3"
                               maxlength="10"
                               pattern="[0-9]{10}"
                               oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)"
                               placeholder="Enter 10 Digit Mobile Number"
                               required>

                        <div id="patientFound"
                             class="alert alert-success mb-3"
                             style="display:none;">

                            ✅ Patient Found Successfully

                        </div>

                        <div id="patientNotFound"
                             class="alert alert-danger mb-3"
                             style="display:none;">

                            ❌ Patient Not Found

                        </div>

                        <label>Patient Name</label>

                        <input type="text"
                               id="patient_name"
                               name="patient_name"
                               class="form-control mb-3"
                               readonly
                               required>

                        <div class="row">

                            <div class="col-md-6">

                                <label>Age</label>

                                <input type="text"
                                       id="age"
                                       class="form-control mb-3"
                                       readonly>

                            </div>

                            <div class="col-md-6">

                                <label>Gender</label>

                                <input type="text"
                                       id="gender"
                                       class="form-control mb-3"
                                       readonly>

                            </div>

                        </div>

                        <label>Problem Type</label>

                        <select name="problem"
                                id="problem"
                                class="form-select mb-3"
                                required>

                            <option value="">Select Problem</option>
                            <option value="Fever">Fever</option>
                            <option value="Cold & Cough">Cold & Cough</option>
                            <option value="Heart Problem">Heart Problem</option>
                            <option value="Eye Problem">Eye Problem</option>
                            <option value="Skin Problem">Skin Problem</option>
                            <option value="Bone Problem">Bone Problem</option>
                            <option value="ENT Problem">ENT Problem</option>
                            <option value="Other">Other</option>

                        </select>

                        <div id="otherBox" style="display:none;">

                            <label>Describe Problem</label>

                            <textarea name="other_problem"
                                      class="form-control mb-3"
                                      rows="3"
                                      placeholder="Enter Problem Details"></textarea>

                        </div>

                        <label>Search Doctor</label>

                        <input type="text"
                               id="doctorSearch"
                               class="form-control mb-2"
                               placeholder="Type Doctor Name">

                        <label>Select Doctor</label>

                        <select name="doctor_name"
                                id="doctorSelect"
                                class="form-select mb-3"
                                required>

                            <option value="">
                                Select Doctor
                            </option>

                            {% for d in doctors %}

                            <option value="{{ d[1] }}">
                                👨‍⚕️ {{ d[1] }} |
                                {{ d[2] }} |
                                {{ d[6] }} Years Exp |
                                ⭐ {{ d[7] }}
                            </option>

                            {% endfor %}

                        </select>

                        <label>Appointment Date</label>

                        <input type="date"
                               id="appointment_date"
                               name="appointment_date"
                               class="form-control mb-3"
                               required>

                        <div class="alert alert-info">
                            📌 Appointment Token Number will be generated automatically.
                        </div>

                        <div class="d-grid gap-3 mt-4">

                        <button
                                type="submit"
                                class="btn btn-warning btn-lg fw-bold shadow">

                                🚀 Book Appointment

                        </button>

                            {% if session.get('patient_phone') %}

                        <a href="/patient_dashboard"
                            class="btn btn-success btn-lg fw-bold shadow">

                            🧑 Patient Dashboard

                        </a>

                            {% else %}

                        <a href="/dashboard"
                            class="btn btn-primary btn-lg fw-bold shadow">

                            👨‍💼 Admin Dashboard

                        </a>

                        {% endif %}

                    </div>


                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    // Other Problem Box

    document.getElementById("problem")
    .addEventListener("change", function(){

        if(this.value === "Other"){

            document.getElementById("otherBox").style.display = "block";

        }
        else{

            document.getElementById("otherBox").style.display = "none";

        }

    });

    // Disable Previous Dates

    let today = new Date().toISOString().split('T')[0];

    document.getElementById("appointment_date")
    .setAttribute("min", today);

    // Doctor Search

    document.getElementById("doctorSearch")
    .addEventListener("keyup", function(){

        let filter = this.value.toUpperCase();

        let select = document.getElementById("doctorSelect");

        let options = select.getElementsByTagName("option");

        for(let i=0;i<options.length;i++){

            let txt = options[i].textContent;

            if(txt.toUpperCase().indexOf(filter) > -1){

                options[i].style.display = "";

            }
            else{

                options[i].style.display = "none";

            }

        }

    });

    // Patient Auto Fetch

    document.getElementById("phone")
    .addEventListener("keyup", function(){

        let phone = this.value;

        if(phone.length == 10){

            fetch('/get_patient/' + phone)

            .then(response => response.json())

            .then(data => {

                if(data.name){

                    document.getElementById("patient_name").value = data.name;
                    document.getElementById("age").value = data.age;
                    document.getElementById("gender").value = data.gender;

                    document.getElementById("patientFound").style.display = "block";
                    document.getElementById("patientNotFound").style.display = "none";

                }
                else{

                    document.getElementById("patient_name").value = "";
                    document.getElementById("age").value = "";
                    document.getElementById("gender").value = "";

                    document.getElementById("patientFound").style.display = "none";
                    document.getElementById("patientNotFound").style.display = "block";

                }

            });

        }

    });

</script>

</body>
</html>
