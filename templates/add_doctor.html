<!DOCTYPE html>

<html>
<head>
    <title>Add Doctor</title>
    
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

.card{
    border:none;
    border-radius:25px;
    overflow:hidden;
    background:rgba(255,255,255,0.97);
    box-shadow:0 20px 50px rgba(0,0,0,.20);
}

.card-header{
    background:linear-gradient(45deg,#11998e,#38ef7d)!important;
    border:none;
    padding:20px;
}

.card-header h3{
    text-align:center;
    font-weight:700;
    margin:0;
}

.form-control,
.form-select{
    border-radius:12px;
    border:2px solid #e5e7eb;
    padding:12px;
    transition:.3s;
}

.form-control:focus,
.form-select:focus{
    border-color:#11998e;
    box-shadow:0 0 12px rgba(17,153,142,.25);
}

.form-label{
    font-weight:600;
    color:#374151;
}

.btn-success{
    background:linear-gradient(45deg,#11998e,#38ef7d);
    border:none;
    border-radius:12px;
    padding:14px;
    font-weight:700;
    transition:.3s;
}

.btn-success:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.alert-success{
    border:none;
    border-radius:12px;
    font-weight:600;
}

</style>

</head>

<body>

<div class="container mt-5">


<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card">

            <div class="card-header text-white">

                <h3>
                    👨‍⚕️ Add Doctor
                </h3>

            </div>

            <div class="card-body p-4">

                {% with messages = get_flashed_messages() %}
                {% if messages %}

                <div class="alert alert-success" id="successMsg">

                    {{ messages[0] }}

                </div>

                {% endif %}
                {% endwith %}

                <form method="POST">

                    <label class="form-label">
                        Doctor Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control mb-3"
                           placeholder="Enter Doctor Name"
                           required>

                    <label class="form-label">
                        Specialization
                    </label>

                    <select name="specialization"
                            class="form-select mb-3"
                            required>

                        <option value="">
                            Select Specialization
                        </option>

                        <option value="General Physician">
                            General Physician
                        </option>

                        <option value="Cardiologist">
                            Cardiologist
                        </option>

                        <option value="Dermatologist">
                            Dermatologist
                        </option>

                        <option value="Orthopedic">
                            Orthopedic
                        </option>

                        <option value="ENT Specialist">
                            ENT Specialist
                        </option>

                        <option value="Eye Specialist">
                            Eye Specialist
                        </option>

                    </select>

                    <label class="form-label">
                        Degree
                    </label>

                    <input type="text"
                           name="degree"
                           class="form-control mb-3"
                           placeholder="MBBS, MD, MS"
                           required>

                    <label class="form-label">
                        Experience (Years)
                    </label>

                    <input type="number"
                           name="experience"
                           class="form-control mb-3"
                           min="0"
                           max="50"
                           placeholder="Enter Experience"
                           required>

                    <label class="form-label">
                        Rating
                    </label>

                    <input type="number"
                           name="rating"
                           class="form-control mb-3"
                           step="0.1"
                           min="1"
                           max="5"
                           placeholder="Enter Rating"
                           required>

                    <label class="form-label">
                        Phone Number
                    </label>

                    <input type="text"
                           name="phone"
                           class="form-control mb-3"
                           maxlength="10"
                           pattern="[0-9]{10}"
                           placeholder="Enter Phone Number"
                           required>

                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control mb-4"
                           placeholder="Enter Email Address"
                           required>

                    <label>Password</label>

                    <input type="password"
                            name="password"
                            class="form-control"
                            minlength="6"
                            maxlength="20"
                            placeholder="Enter Password"
                            required>

                    <br>

                    <button type="submit"
                            class="btn btn-success w-100">

                        💾 Save Doctor

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

<script>

setTimeout(function(){

    let msg =
    document.getElementById("successMsg");

    if(msg)
    {
        msg.style.transition = "0.5s";
        msg.style.opacity = "0";

        setTimeout(function(){

            msg.style.display = "none";

        },500);
    }

},2000);

</script>

</body>
</html>
