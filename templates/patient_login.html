<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #1e3a8a,
        #6d28d9,
        #9333ea
    );
}

.login-card{

    width:450px;
    background:#081028;
    border-radius:25px;
    overflow:hidden;

    box-shadow:
    0 15px 40px rgba(0,0,0,.35);

}

.card-header{

    background:linear-gradient(
        135deg,
        #7c3aed,
        #a855f7
    );

    color:white;
    text-align:center;
    padding:30px;

}

.card-header h1{
    font-size:34px;
    font-weight:700;
}

.card-header p{
    margin-top:8px;
    opacity:.9;
}

.card-body{
    padding:35px;
}

label{
    color:white;
    font-weight:600;
    margin-bottom:8px;
}

.form-control{

    background:#1e293b;
    border:none;
    color:white;

    height:55px;
    border-radius:12px;
}

.form-control:focus{

    background:#1e293b;
    color:white;

    box-shadow:
    0 0 0 3px rgba(168,85,247,.35);

}

.form-control::placeholder{
    color:#94a3b8;
}

.login-btn{

    width:100%;
    border:none;

    height:55px;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:white;
    font-size:18px;
    font-weight:700;

    transition:.3s;
}

.login-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 20px rgba(34,197,94,.35);

}

.back-btn{

    width:100%;
    margin-top:12px;

    border-radius:12px;
    height:50px;

    font-weight:600;
}

.icon-box{

    width:90px;
    height:90px;

    margin:auto;
    margin-bottom:15px;

    border-radius:50%;

    background:rgba(255,255,255,.15);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:40px;
}

.alert-danger{
    border:none;
    border-radius:12px;
    font-weight:600;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(220,53,69,.25);
}

</style>

</head>
<body>

<div class="login-card">

    <div class="card-header">

        <div class="icon-box">
            <i class="fas fa-user-injured"></i>
        </div>

        <h1>Patient Login</h1>

        <p>
            Hospital Management System
        </p>

    </div>

    <div class="card-body">

        <!-- Flash Message -->

        {% with messages = get_flashed_messages() %}
            {% if messages %}

                <div class="alert alert-danger text-center">

                    {{ messages[0] }}

                </div>

            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">

                <label>
                    <i class="fas fa-phone"></i>
                    Mobile Number
                </label>

                <input
                type="text"
                name="phone"
                class="form-control"
                maxlength="10"
                placeholder="Enter Mobile Number"
                required>

            </div>

            <div class="mb-4">

                <label>
                    <i class="fas fa-lock"></i>
                    Password
                </label>

                <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

            </div>

            <div class="text-end mt-2">

            <a href="/forgot_password"
                class="text-decoration-none">

                 Forgot Password?

            </a>

            </div>

            <button
            type="submit"
            class="login-btn">

                <i class="fas fa-sign-in-alt"></i>
                Login

            </button>

            <a href="/"
               class="btn btn-secondary back-btn">

                <i class="fas fa-arrow-left"></i>
                Home

            </a>

        </form>

    </div>

</div>

</body>
</html>
