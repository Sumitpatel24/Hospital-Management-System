<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    135deg,
    #0f172a,
    #1e293b,
    #312e81
    );

    padding:20px;
}

.password-card{

    width:100%;
    max-width:650px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:30px;

    overflow:hidden;

    box-shadow:
    0 25px 50px rgba(0,0,0,.35);
}

.card-header{

    padding:35px;

    text-align:center;

    border:none;

    background:
    linear-gradient(
    135deg,
    #7c3aed,
    #9333ea
    );
}

.card-header h2{

    color:white;

    font-size:38px;

    font-weight:800;

    margin-bottom:8px;
}

.card-header p{

    color:#f1f5f9;

    margin:0;
}

.card-body{
    padding:35px;
}

.form-label{

    color:white;

    font-weight:600;

    margin-bottom:8px;
}

.form-control{

    height:60px;

    border-radius:15px;

    border:1px solid rgba(255,255,255,.15);

    background:
    rgba(255,255,255,.08);

    color:white;

    margin-bottom:20px;
}

.form-control::placeholder{
    color:#cbd5e1;
}

.form-control:focus{

    background:
    rgba(255,255,255,.12);

    color:white;

    border:1px solid #8b5cf6;

    box-shadow:
    0 0 0 4px rgba(139,92,246,.25);
}

.btn-change{

    width:100%;

    height:60px;

    border:none;

    border-radius:15px;

    color:white;

    font-size:18px;

    font-weight:700;

    background:
    linear-gradient(
    135deg,
    #10b981,
    #059669
    );

    transition:.3s;
}

.btn-change:hover{

    transform:translateY(-3px);

    box-shadow:
    0 15px 30px rgba(16,185,129,.35);
}

.btn-back{

    width:100%;

    height:55px;

    border:none;

    border-radius:15px;

    margin-top:12px;

    color:white;

    text-decoration:none;

    display:flex;

    justify-content:center;

    align-items:center;

    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #3b82f6,
    #2563eb
    );
}

.btn-back:hover{
    color:white;
}

</style>

</head>
<body>

<div class="password-card">

<div class="card-header">

    <h2>
        🔐 Change Password
    </h2>

    <h2>👨‍⚕️ Doctor Change Password</h2>

</div>

<div class="card-body">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

        {% for category, message in messages %}

            <div class="alert alert-{{ category }}">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}
    {% endwith %}

    <form method="POST">

        <label class="form-label">
            Current Password
        </label>

        <input
            type="password"
            name="current_password"
            class="form-control"
            placeholder="Enter Current Password"
            required>

        <label class="form-label">
            New Password
        </label>

        <input
            type="password"
            name="new_password"
            class="form-control"
            minlength="6"
            placeholder="Enter New Password"
            required>

        <label class="form-label">
            Confirm Password
        </label>

        <input
            type="password"
            name="confirm_password"
            class="form-control"
            minlength="6"
            placeholder="Confirm New Password"
            required>

        <button
            type="submit"
            class="btn-change">

            ✅ Change Password

        </button>

        <a href="/dashboard"
           class="btn-back">

            ⬅ Back To Dashboard

        </a>

    </form>

</div>

</div>

</body>
</html>
